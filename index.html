<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppEcommerce</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="encabezado">
        <div class="bienvenida" id="inicio">
            <h4>Hello, Welcome &#128075;</h4>
            <h2>Juan Carlos Mariño</h2>
        </div>
        <div class="usuario">
            <img src="storage/img/login.png">
        </div>
    </header>
    <main>
        <section class="filtros">
                <input type="text" placeholder="Search clothes...">
                <button><img src="storage/img/filter.png"></button>
        </section>
        <section class="categorias">
            <button class="all">All Items</button>
            <button class="dress">Dress</button>
            <button class="tshirt">T-Shirt</button>
            <button class="pants">Pants</button>
        </section>
        <section class="catalogo">
            <article class="producto">
                <div class="favorito"></div>
                <a href="views/detail.html"><img src="storage/img/imagen1.png"></a>
                <h2>Modern Light Clothes</h2>
                <h5>T-Shirt</h5>
                <div>
                    <h2>$212.99</h2>
                    <p>&#11088; 5.0</p>
                </div>
            </article>
            <article class="producto">
                <div class="favorito"></div>
                <a href="views/detail.html"><img src="storage/img/imagen2.png"></a>
                <h2>Light Dress Bless</h2>
                <h5>Dress modern</h5>
                <div>
                    <h2>$162.99</h2>
                    <p>&#11088; 5.0</p>
                </div>
            </article>
            <article class="producto">
                <div class="favorito"></div>
                <a href="views/detail.html"><img src="storage/img/imagen3.png"></a>
                <h2>Urban Dress Clothes</h2>
                <h5>Dress</h5>
                <div>
                    <h2>$199.99</h2>
                    <p>&#11088; 5.0</p>
                </div>
            </article>
            <article class="producto">
                <div class="favorito"></div>
                <a href="views/detail.html"><img src="storage/img/imagen4.png"></a>
                <h2>Classic Suit Dress</h2>
                <h5>Suit</h5>
                <div>
                    <h2>$299.99</h2>
                    <p>&#11088; 5.0</p>
                </div>
            </article>
        </section>
        <div class="contenedorMenu">
            <nav>
                <ul class="menu">
                    <li><a href="#inicio"><img src="storage/img/inicio.png"></a></li>
                    <li><a href="views/checkout.html"><img src="storage/img/checkout.png"></a></li>
                    <li><a href="#inicio"><img src="storage/img/favMenu.png"></a></li>
                    <li><a href="#inicio"><img src="storage/img/perfil.png"></a></li>
                </ul>
            </nav>
        </div>
        <footer>
            <h5>Autor: Kevin Chávez. 2026 Todos los derechos reservados.</h5>
        </footer>
    </main>
</body>
</html>
